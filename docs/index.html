<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The official DS Style user guide for EZ-Flash Omega and Omega Definitive Edition.">
  <title>DS Style User Guide</title>
  <style>
    :root {
      color-scheme: light;
      --navy: #15243a;
      --blue: #3a6ea5;
      --purple: #7255a6;
      --paper: #ffffff;
      --mist: #f3f6fa;
      --line: #d9e1ea;
      --ink: #17202b;
      --muted: #667386;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--mist);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px clamp(20px, 4vw, 56px);
      background: var(--navy);
      color: white;
      border-bottom: 3px solid var(--purple);
    }

    .title h1 {
      margin: 0 0 3px;
      font-size: clamp(20px, 3vw, 28px);
      letter-spacing: 0;
    }

    .title p {
      margin: 0;
      color: #d9e1ea;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid #7f91a8;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .button.primary {
      background: var(--blue);
      border-color: var(--blue);
    }

    .button:hover {
      background: #294a70;
    }

    main {
      flex: 1;
      min-height: 0;
      padding: 18px clamp(12px, 2.5vw, 34px) 24px;
    }

    .viewer {
      width: 100%;
      height: 100%;
      min-height: 720px;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: 0 8px 30px rgba(21, 36, 58, 0.12);
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 720px;
      border: 0;
    }

    .fallback {
      display: none;
      max-width: 620px;
      margin: 60px auto;
      padding: 30px;
      text-align: center;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .fallback h2 { color: var(--navy); }
    .fallback p { color: var(--muted); line-height: 1.5; }

    @media (max-width: 700px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
        justify-content: flex-start;
      }

      main { padding: 0; }

      .viewer {
        min-height: calc(100vh - 154px);
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      iframe { min-height: calc(100vh - 154px); }
    }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <h1>DS Style User Guide</h1>
      <p>For EZ-Flash Omega and Omega Definitive Edition</p>
    </div>
    <nav class="actions" aria-label="Guide actions">
      <a class="button primary" href="DS%20Style%20User%20Guide.pdf" target="_blank" rel="noopener">Open PDF</a>
      <a class="button" href="DS%20Style%20User%20Guide.pdf" download>Download</a>
      <a class="button" href="https://github.com/FrankieT19/omega-de-ds-style-kernel">Source</a>
    </nav>
  </header>

  <main>
    <div class="viewer">
      <iframe
        src="DS%20Style%20User%20Guide.pdf#view=FitH"
        title="DS Style User Guide PDF">
      </iframe>
    </div>
    <noscript>
      <section class="fallback">
        <h2>Open the guide</h2>
        <p>Your browser cannot display the embedded guide here.</p>
        <a class="button primary" href="DS%20Style%20User%20Guide.pdf">Open PDF</a>
      </section>
    </noscript>
  </main>
</body>
</html>
